<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết</title>
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script type="module" src="js\sanpham\xuly.js"></script>
    <link rel="stylesheet" href="\css\styles-trangchu.css"> 
    <link rel="stylesheet" href="\css\styles-sanpham.css"> 
    <link rel="icon" type="image/png" href="/images/quancua2-favicon.png">
    <link rel="stylesheet" href="/css/styles-chitietsp.css">
</head>
<body class="page">
    <div id="top"></div>
    <div id="header"></div>
    <main class="page-main">
        <ul class="breadcrumb">
        </ul>
        <div class="product__detail"></div>
        <section class="suggest">
            <h3 class="suggest__title"> Đề xuất khác </h3>
            <div class="suggest__content"></div>
        </section>
        <section class="review">
            <article class="rating">
                <h4> ĐÁNH GIÁ </h4>
                <h5> TỔNG 4.5/5 trên tổng số 256 đánh giá </h4>
                <span class="fa -solid fa-star"></span>
                <span class="fa -solid fa-star"></span>
                <span class="fa -solid fa-star"></span>
                <span class="fa -solid fa-star"></span>
                <span class="fa-solid fa-star-half-stroke"></span>
            </article>
            <article class="comment">
                <h4> BÌNH LUẬN </h4>
                <div class="account-comment">
                    <strong> Minh Luân </strong>
                    <span>3 giờ trước</span>
                    <p> Đồ ăn ngon lắm nha shop </p>
                </div>
                <div class="account-comment">
                    <strong> Thảo Ly </strong>
                    <span> 2 ngày trước</span>
                    <p> Chủ quán siêu có tâm </p>
                </div>
                <form class="comment-form">
                    <label for="comment-form"> Để lại bình luận </label>
                    <input type="text" id="commet-messange" placeholder="Nhập bình luận của bạn....">
                    <button type="submit">Gửi bình luận</button> 
                </form>
            </article>
        </section>
    </main>
    <footer id="footer"></footer>
    <script type="module" src="/js/load-components.js"></script>
    <script src="/js/user.js"></script>
</body>
</html>
