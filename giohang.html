<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="giohang.css">
    <link rel="icon" type="image/png" href="/images/quancua2-favicon.png">

    <title>Giỏ hàng</title>
</head>

<body>

    <div id="top"></div>

    <div id="header"></div>

    <main class="page-main">

        <header class="cart-header">
            <span class="cart-icon">🛒</span>
            <h1>GIỎ HÀNG</h1>
        </header>

        <div class="cart-container">

            <div class="cart-row cart-title">
                <div>Tên sản phẩm</div>
                <div>Số lượng</div>
                <div>Giá</div>
                <div>Thành tiền</div>
                <div>Xóa</div>
            </div>

            <div id="cart-body"></div>

        </div>

        <footer class="cart-footer">

            <div class="tong-tien">
                Tổng tiền:
                <span id="tongtien">0</span>đ
            </div>

            <div class="cart-buttons">

                <button
                    class="back-btn" id="back-btn">
                    ← Tiếp tục mua hàng
                </button>

                <button
                    class="checkout-btn" id="checkout-btn">
                    Đặt hàng
                </button>

            </div>
            <div class="checkout-info" id="checkout-form">

                <h2>Thông tin nhận hàng</h2>

                <input type="text" id="hoten" placeholder="Họ và tên">

                <input type="text" id="sdt" placeholder="Số điện thoại">

                <textarea id="diachi" placeholder="Địa chỉ"></textarea>

                <button id="btn-order" >
                    Đặt hàng
                </button>

            </div>

        </footer>

    </main>

    <div id="footer"></div>

    <script src="/js/load-components.js"></script>
    <script src="giohang.js"></script>

</body>
</html>
