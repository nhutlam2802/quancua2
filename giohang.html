<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/styles-trangchu.css">
    <link rel="stylesheet" href="/css/giohang.css">
    <link rel="icon" type="image/png" href="/images/quancua2-favicon.png">
    <title>Giỏ hàng</title>
</head>

<body>
    <div id="top"></div>
    <div id="header"></div>
    <main class="page-main">
        <section class="cart-header">
            <span class="cart-icon"> <i class="fa-solid fa-cart-shopping"></i></span>
            <h1>GIỎ HÀNG</h1>
        </section>
        
        <section class="cart-container">
            <div class="cart-row cart-title">
                <div>Tên sản phẩm</div>
                <div>Số lượng</div>
                <div>Giá</div>
                <div>Thành tiền</div>
                <div>Xóa</div>
            </div>
            <div id="cart-body"></div>
        </section>

        <section class="cart-footer">

            <div class="tong-tien">
                Tổng tiền:
                <span id="tongtien">0</span>đ
            </div>

            <div class="cart-buttons">

                <button
                    class="back-btn" id="back-btn">
                    ← Tiếp tục mua hàng
                </button>

                <button
                    class="checkout-btn" id="checkout-btn">
                    Đặt hàng
                </button>

            </div>

        </section>
        <div class="modal" id="checkout-modal">

                <div class="modal-content">

                    <span class="close-modal" id="close-modal">&times;</span>

                    <h2>Thông tin nhận hàng</h2>

                    <input
                        type="text"
                        id="hoten"
                        placeholder="Họ và tên">

                    <input
                        type="text"
                        id="sdt"
                        placeholder="Số điện thoại">

                    <textarea
                        id="diachi"
                        placeholder="Địa chỉ"></textarea>
                    <textarea
                            id="ghichu"
                            placeholder="Ghi chú (Ví dụ: Ít cay, không hành, thêm tương, ...)"></textarea>
                           
                    <hr>

                    <h3>Đơn hàng của bạn:</h3>

                    <div id="order-list"></div>

                    <p>

                        <strong>Tổng số lượng:</strong>

                        <span id="order-quantity">0</span>

                    </p>

                    <p>

                        <strong>Tổng tiền:</strong>

                        <span id="order-total">0</span>đ

                    </p>

                    <button id="btn-order">

                        Xác nhận đặt hàng

                    </button>

                </div>

            </div>

    </main>

    <div id="footer"></div>

    <script type="module" src="/js/load-components.js"></script>
    <script src="/js/giohang.js"></script>

</body>
</html>
