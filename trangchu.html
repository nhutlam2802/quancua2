<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/styles-trangchu.css">
    <link rel="icon" type="image/png" href="/images/quancua2-favicon.png">
    <title>Trang chủ</title>
</head>

<body>
    <div id="top"></div>

    <div id="header"></div>

    <main class="page-main">
        <section class="page-main__banner-slider">
            <div class="page-main__banner active">
                <img src="/images/banner1.png" alt="Banner 1">
            </div>
            <div class="page-main__banner">
                <img src="/images/banner2.png" alt="Banner 2">
            </div>
            <div class="page-main__banner">
                <img src="/images/banner3.png" alt="Banner 3">
            </div>
        
            <button class="page-main__banner-btn page-main__banner-btn--prev">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="page-main__banner-btn page-main__banner-btn--next">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

            <div class="page-main__banner-dots">
                <span class="page-main__banner-dot active"></span>
                <span class="page-main__banner-dot"></span>
                <span class="page-main__banner-dot"></span>
            </div>
        </section> 
    </main>


    <div id="footer"></div>

    <script src="/js/load-components.js"></script>
    <script src="/js/trangchu.js"></script>

</body>

</html>
