<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/styles-trangchu.css">
    <link rel="icon" type="image/png" href="/images/quancua2-favicon.png">
    <title>Trang chủ</title>
</head>

<body>
    <div id="top"></div>

    <div id="header"></div>

    <main class="page-main">
        <section class="page-main__banner-slider">
            <div class="page-main__banner active">
                <img src="/images/banner1.png" alt="Banner 1">
            </div>
            <div class="page-main__banner">
                <img src="/images/banner2.png" alt="Banner 2">
            </div>
            <div class="page-main__banner">
                <img src="/images/banner3.png" alt="Banner 3">
            </div>
        
            <button class="page-main__banner-btn page-main__banner-btn--prev">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <button class="page-main__banner-btn page-main__banner-btn--next">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

            <div class="page-main__banner-dots">
                <span class="page-main__banner-dot active"></span>
                <span class="page-main__banner-dot"></span>
                <span class="page-main__banner-dot"></span>
            </div>
        </section>
        
        <section class="suggest-detail">
            <h2 class="suggest-detail__title">Món ăn bán chạy</h2>
            <div class="suggest-detail__content"></div>
        </section>

        <section class="promotion">
            <h2 class="promotion__title">Khuyến mãi hấp dẫn</h2>
            <div class="promotion__grid">
                <a href="combo1.html" class="promotion__link">
                    <div class="promotion__item">
                        <img src="/images/combo1nguoi.png" alt="Combo 1 người">
                    </div>
                </a>
                <a href="combo2.html" class="promotion__link">
                    <div class="promotion__item">
                        <img src="/images/combo2nguoi.png" alt="Combo 2 người">
                    </div>
                </a>
                <a href="combo4.html" class="promotion__link">
                    <div class="promotion__item">
                        <img src="/images/combo4nguoi.png" alt="Combo 4 người">
                    </div>
                </a>
                <a href="combo9.html" class="promotion__link">
                    <div class="promotion__item">
                        <img src="/images/combo9nguoi.png" alt="Combo 9 người">
                    </div>
                </a>                                            
            </div>
        </section>

    </main>

    <div id="footer"></div>

    <script type="module" src="/js/load-components.js"></script>
    <script src="/js/user.js"></script>
    <script type="module" src="/js/trangchu.js"></script>

</body>
</html>
